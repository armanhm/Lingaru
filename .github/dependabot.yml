version: 2

updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    groups:
      django:
        patterns: ["Django*", "django-*", "djangorestframework*"]
      llm:
        patterns: ["google-genai", "groq", "sentry-sdk*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    groups:
      react:
        patterns: ["react", "react-dom", "react-router*", "@types/react*"]
      sentry:
        patterns: ["@sentry/*"]
      eslint:
        patterns: ["eslint*", "@eslint/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    labels: [dependencies, docker]
