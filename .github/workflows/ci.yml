name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install "ruff>=0.7,<1.0"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-only-not-secret
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Run pytest
        run: pytest --tb=short -q --cov=apps --cov=services --cov-report=xml --cov-report=term

      # PR coverage comment, free / no signup. Reads the coverage.xml
      # written by pytest-cov above and posts a comment with totals
      # plus diff vs. base branch. Skipped on push events.
      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@v1.7.2
        with:
          pytest-xml-coverage-path: backend/coverage.xml
          title: Backend test coverage
          badge-title: coverage
          hide-badge: false
          hide-report: false

  frontend-lint:
    name: Frontend lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: ESLint
        run: npm run lint

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Build the backend image so Trivy can scan the actual artifact
      # we ship, not just the requirements.txt. Skipping `--push`, this
      # is a throwaway image local to the runner.
      - name: Build backend image
        run: docker build -t lingaru-backend:scan ./backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lingaru-backend:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'           # don't fail the job yet; surface findings via SARIF
          ignore-unfixed: true     # only flag issues with a known fix

      # SARIF upload puts findings in GitHub's "Security" tab so they
      # show up next to CodeQL alerts.
      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-backend
