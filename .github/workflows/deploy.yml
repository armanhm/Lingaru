name: Deploy to Hetzner

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # Record the SHA currently live on the server so we can roll back
      # later if migrations or the smoke test fail. Stored as a step
      # output for downstream steps to reference.
      - name: Capture previous SHA (for rollback)
        id: prev
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH }}
        run: |
          PREV=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" "cd $DEPLOY_PATH && git rev-parse HEAD")
          echo "Previous live SHA: $PREV"
          echo "sha=$PREV" >> "$GITHUB_OUTPUT"

      - name: Pull + rebuild on server
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd $DEPLOY_PATH && git fetch origin main && git reset --hard origin/main && docker compose up -d --build && docker compose ps"

      - name: Wait for django to come up
        run: sleep 15

      - name: Run database migrations
        id: migrate
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd $DEPLOY_PATH && docker compose exec -T django python manage.py migrate --noinput"

      - name: Smoke test (health endpoint)
        id: smoke
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          # Default to the public app URL if no override is set
          URL="${HEALTH_URL:-https://app.armanflower.shop/api/health/}"
          echo "Probing $URL"
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "$URL" | grep -q '"status": "ok"'; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      # Self-healing rollback. Fires only when the migrate or smoke-test
      # step above failed. Resets the server to the SHA that was live
      # before this deploy, rebuilds, and re-checks health. The job
      # itself still ends as failed so you get notified, but the live
      # site is restored to a known-good state.
      - name: Rollback on failure
        if: failure() && steps.prev.outputs.sha != ''
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH }}
          PREV_SHA: ${{ steps.prev.outputs.sha }}
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          echo "::warning::Deploy failed, rolling back to $PREV_SHA"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd $DEPLOY_PATH && git reset --hard $PREV_SHA && docker compose up -d --build && docker compose ps"
          sleep 15
          URL="${HEALTH_URL:-https://app.armanflower.shop/api/health/}"
          if curl -fsS --max-time 10 "$URL" | grep -q '"status": "ok"'; then
            echo "Rollback verified: $URL is healthy on $PREV_SHA"
          else
            echo "::error::Rollback completed but health check still failing. Manual intervention required."
          fi
