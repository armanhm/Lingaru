name: Deploy to Hetzner

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull + rebuild on server
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          DEPLOY_PATH: ${{ secrets.HETZNER_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd $DEPLOY_PATH && git fetch origin main && git reset --hard origin/main && docker compose up -d --build && docker compose ps"

      - name: Wait for app to come up
        run: sleep 15

      - name: Smoke test (health endpoint)
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          # Default to the public app URL if no override is set
          URL="${HEALTH_URL:-https://app.armanflower.shop/api/health/}"
          echo "Probing $URL"
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "$URL" | grep -q '"status": "ok"'; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
