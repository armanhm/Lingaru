name: Lighthouse CI

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Lighthouse is slow (~3 min per page); only run on PRs so push-to-main
# isn't blocked. Deploy still gates on CI, not Lighthouse.
jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse on built bundle
        # Lighthouse boots `vite preview` itself (configured below), runs
        # against the chosen URLs, and asserts the thresholds in
        # lighthouserc.json. `|| true` is intentional, missing static
        # routes (e.g. /login when auth is the only public route)
        # shouldn't block PRs. We surface results via summary instead.
        run: lhci autorun --upload.target=temporary-public-storage || true

      # Tail the lighthouse output into the PR step summary so reviewers
      # can see scores without clicking into the artifact storage.
      - name: Surface scores in summary
        if: always()
        run: |
          if [ -d .lighthouseci ]; then
            echo "## Lighthouse scores" >> "$GITHUB_STEP_SUMMARY"
            for f in .lighthouseci/lhr-*.json; do
              if [ -f "$f" ]; then
                URL=$(jq -r '.finalUrl' "$f")
                PERF=$(jq -r '.categories.performance.score * 100 | floor' "$f")
                A11Y=$(jq -r '.categories.accessibility.score * 100 | floor' "$f")
                BP=$(jq -r '.categories["best-practices"].score * 100 | floor' "$f")
                SEO=$(jq -r '.categories.seo.score * 100 | floor' "$f")
                echo "| Page | Perf | A11y | Best Practices | SEO |" >> "$GITHUB_STEP_SUMMARY"
                echo "|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
                echo "| $URL | $PERF | $A11Y | $BP | $SEO |" >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          fi
